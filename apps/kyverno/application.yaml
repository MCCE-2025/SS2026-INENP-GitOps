apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
spec:
  project: platform

  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.8.1
    helm:
      values: |
        config:
          preserve: false

        admissionController:
          replicas: 1

        backgroundController:
          replicas: 1

        cleanupController:
          replicas: 1

        reportsController:
          replicas: 1

        webhookLabels:
          app.kubernetes.io/managed-by: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
