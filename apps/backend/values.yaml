replicaCount: 2

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-backend/weather-app-backend
  tag: "v1.3.1"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

# Spring Boot needs ~30s to start; default probes (delay=0) kill the pod before
# Tomcat is listening on :8080, causing CrashLoopBackOff.
livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 35
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
