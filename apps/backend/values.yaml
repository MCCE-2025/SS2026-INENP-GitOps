replicaCount: 2

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-backend/weather-app-backend
  tag: "v1.5.0"

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: weather-app-backend@sonorous-stone-498307-u2.iam.gserviceaccount.com

# Enable after releasing a backend image built with PostgreSQL support (v1.4.0+).
# Password comes from ESO-managed Secret cloud-sql-credentials (see external-secret.yaml).
database:
  enabled: true
  schema: public
  credentialsSecretName: cloud-sql-credentials
  instanceConnectionName: sonorous-stone-498307-u2:europe-west3:weather-app-db

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

# Spring Boot needs ~30s to start; default probes (delay=0) kill the pod before
# Tomcat is listening on :8080, causing CrashLoopBackOff.
livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 35
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
