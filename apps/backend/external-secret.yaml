# Database password for the backend workload. Synced from GCP Secret Manager;
# never stored in Git or Helm values.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloud-sql-credentials
  namespace: backend
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: cloud-sql-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: cloud-sql-app-password
