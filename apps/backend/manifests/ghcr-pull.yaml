apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-app-config
  namespace: backend
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: github-app-config
    creationPolicy: Owner
  data:
    - secretKey: key
      remoteRef:
        key: argocd-github-app-private-key
    - secretKey: appID
      remoteRef:
        key: argocd-github-app-id
    - secretKey: installID
      remoteRef:
        key: argocd-github-app-installation-id
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: backend
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 30m
  target:
    name: ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"x-access-token","password":"{{ .token }}","auth":"{{ printf "x-access-token:%s" .token | b64enc }}"}}}'
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: ghcr-token
