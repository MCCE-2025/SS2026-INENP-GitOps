apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MCCE-2025/SS2026-INENP-GitOps
    targetRevision: HEAD
    path: apps
    directory:
      recurse: true
      exclude: '**/manifests/**'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
