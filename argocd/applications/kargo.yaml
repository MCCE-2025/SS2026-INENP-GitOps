# Kargo — multi-stage code/artifact promotion tool (complements Argo CD).
# Installed from the official OCI Helm chart on GHCR. cert-manager (already on the
# platform) provides the webhook certificates Kargo needs.
#
# Secrets note: the admin password hash and token signing key are NOT in Git.
# They are generated in Terraform, stored in GCP Secret Manager, and synced into
# the kargo namespace as the Secret "kargo-api" by ESO (see IaC kargo-secret.tf).
# No manual `kubectl create secret` is needed. The chart reads it via
# api.secret.name below. (Get the admin UI password with:
# `terraform output -raw kargo_admin_password`.)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo
  namespace: argocd
spec:
  project: platform

  source:
    repoURL: ghcr.io/akuity/kargo-charts
    chart: kargo
    targetRevision: 1.10.7
    helm:
      releaseName: kargo
      values: |
        api:
          # Tiny resources — Kargo is not used actively (API idles at ~1m / 27Mi).
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # Public host for the Kargo UI/API. Used for the Ingress, the issued
          # certificate, and Kargo's own OIDC issuer/callback URLs.
          host: kargo.inenp.werschlan.at
          # Admin password hash + token signing key come from a pre-created
          # Secret (see header), never from Git.
          secret:
            name: kargo-api
          service:
            type: ClusterIP
          # TLS is terminated at the nginx Ingress (letsencrypt-prod), so the API
          # server itself serves plain HTTP upstream.
          tls:
            enabled: false
          # Stable HTTPS link instead of `kubectl port-forward`. cert-manager
          # (letsencrypt-prod) fills the kargo-api-ingress-cert secret; external-dns
          # creates the DNS record — same pattern as the tenant frontends.
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              external-dns.alpha.kubernetes.io/hostname: kargo.inenp.werschlan.at
            tls:
              enabled: true
              selfSignedCert: false
              secretName: kargo-api-ingress-cert
        controller:
          replicas: 1
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
        # Tiny resources for the remaining components. Kargo is not used actively;
        # all components idle at 1-2m CPU / ~20Mi. Setting explicit requests/limits
        # makes scheduling predictable and satisfies the Kyverno requests/limits
        # policy (was BestEffort QoS with nothing set).
        managementController:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
        webhooksServer:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        externalWebhooksServer:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        garbageCollector:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: kargo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
