apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
  annotations:
    # Deploy after ClusterIssuer (wave 15) is ready, so cert-manager can issue
    # TLS certificates on first sync instead of failing with a stale ACME order.
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: apps

  sources:
    - repoURL: https://github.com/MCCE-2025/SS2026-INENP-frontend
      targetRevision: HEAD
      path: charts/weather-app-frontend
      helm:
        releaseName: weather-app-frontend
        valueFiles:
          - $values/apps/frontend/values.yaml
    - repoURL: https://github.com/MCCE-2025/SS2026-INENP-GitOps
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: frontend

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
