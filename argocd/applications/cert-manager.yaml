apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: platform
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.2
    helm:
      values: |
        crds:
          enabled: true
        # Workload Identity for the DNS-01 solver: the controller's KSA is
        # annotated with the GCP service account that has roles/dns.admin
        # (provisioned in the IaC repo).
        serviceAccount:
          annotations:
            iam.gke.io/gcp-service-account: cert-manager-dns@sonorous-stone-498307-u2.iam.gserviceaccount.com
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
