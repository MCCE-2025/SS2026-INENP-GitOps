# OpenBao — secrets manager (open-source Vault fork).
#
# Provisioned in STANDALONE mode with file storage on a PVC (persistent, unlike
# dev mode which keeps everything in memory and loses it on restart).
#
# AUTO-UNSEAL via Google Cloud KMS (see IaC openbao-autounseal.tf): the pod uses
# Workload Identity to call the KMS key and unseals itself on every start — no
# manual unseal after restarts.
#
# One-time only: `bao operator init` must still be run ONCE after the first sync
# (it returns recovery keys + the root token, which must not flow through Git/TF):
#
#   kubectl exec -ti openbao-0 -n openbao -- bao operator init
#
# Store the recovery keys + root token safely. No `unseal` step is needed anymore.
#
# This is additive: it does NOT touch the existing ESO + GCP Secret Manager flow
# that the apps currently use.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
spec:
  project: platform

  source:
    repoURL: https://openbao.github.io/openbao-helm
    chart: openbao
    targetRevision: 0.28.4
    helm:
      releaseName: openbao
      values: |
        server:
          # Annotate the OpenBao KSA so Workload Identity lets the pod call Cloud
          # KMS for auto-unseal (GCP SA created in IaC openbao-autounseal.tf).
          serviceAccount:
            create: true
            annotations:
              iam.gke.io/gcp-service-account: openbao-unseal@sonorous-stone-498307-u2.iam.gserviceaccount.com
          standalone:
            enabled: true
            # File storage on the PVC + Cloud KMS auto-unseal. With a gcpckms seal
            # the pod unseals itself on every start using the KMS key; no manual
            # `bao operator unseal` is ever needed.
            config: |
              ui = true

              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }

              storage "file" {
                path = "/openbao/data"
              }

              seal "gcpckms" {
                project    = "sonorous-stone-498307-u2"
                region     = "europe-west3"
                key_ring   = "openbao"
                crypto_key = "openbao-unseal"
              }
          dataStorage:
            enabled: true
            size: 2Gi
          # Sized down: OpenBao idles at ~58m CPU / ~21Mi RAM and is not used
          # actively yet, so requests reserve little node capacity. The CPU limit
          # still allows bursts (e.g. unseal); raise these if it starts handling
          # real secret traffic.
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 250m
              memory: 128Mi
          service:
            type: ClusterIP
        # The Agent Injector is optional and adds a mutating webhook; keep it off
        # so it cannot interfere with existing workloads. Enable later if needed.
        injector:
          enabled: false
        csi:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: openbao

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
