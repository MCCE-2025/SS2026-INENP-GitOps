apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    # Install before cert-manager issuers and app ingresses that depend on it.
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: platform
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      values: |
        controller:
          service:
            type: LoadBalancer
            # ExternalDNS picks up this hostname and creates the DNS record for
            # the shared ingress entrypoint that all tenants route through.
            annotations:
              external-dns.alpha.kubernetes.io/hostname: ingress.inenp.werschlan.at
          ingressClassResource:
            name: nginx
            default: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
