apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dns-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MCCE-2025/SS2026-INENP-GitOps
    targetRevision: feat/argocd-gitops-bootstrap
    path: platform/external-dns/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
