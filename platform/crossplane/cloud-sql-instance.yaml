apiVersion: sql.gcp.m.upbound.io/v1beta1
kind: DatabaseInstance
metadata:
  name: weather-app-db
  annotations:
    crossplane.io/external-name: weather-app-db
    argocd.argoproj.io/sync-wave: "3"
    # In-place updates only. Never delete+recreate the instance, otherwise a
    # databaseVersion bump (major upgrade) would destroy the database instead
    # of upgrading it.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  forProvider:
    databaseVersion: POSTGRES_15
    region: europe-west3
    # Guard against accidental delete+recreate (e.g. during a major upgrade).
    deletionProtection: true
    settings:
      # Dedicated tier (1 vCPU / 3.75 GB). Shared-core tiers (db-f1-micro,
      # db-g1-small) do NOT support HA, and a bigger tier is what actually allows
      # more real connections (RAM-bound), so it pairs with REGIONAL below.
      tier: db-custom-1-3840
      # High availability: a standby in another zone with automatic failover.
      # Note: HA improves availability, it does NOT add connection capacity —
      # the standby is passive. Connection limit comes from tier + max_connections.
      availabilityType: REGIONAL
      # Controlled window for automatic minor/maintenance (patch) upgrades so
      # they land predictably instead of at an arbitrary time. Sunday 03:00,
      # stable update track (lags behind the latest by a few weeks).
      maintenanceWindow:
        day: 7
        hour: 3
        updateTrack: stable
      diskAutoresize: true
      diskSize: 10
      diskType: PD_SSD
      databaseFlags:
        - name: max_connections
          value: "100"
      # Public IP without authorized networks: not reachable from the internet.
      # Backend reaches the DB only through the Cloud SQL Auth Proxy sidecar.
      ipConfiguration:
        ipv4Enabled: true
      backupConfiguration:
        enabled: true
        # PITR gives a rollback/recovery path for risky changes like a major
        # version upgrade.
        pointInTimeRecoveryEnabled: true
        startTime: "03:00"
  providerConfigRef:
    name: default
    kind: ClusterProviderConfig
  writeConnectionSecretToRef:
    name: weather-app-db-connection
