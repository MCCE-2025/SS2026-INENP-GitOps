apiVersion: gcp.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    # ProviderConfig CRD is installed by the Provider in wave 0, so apply this
    # one wave later. SkipDryRunOnMissingResource avoids a failed dry-run while
    # the CRD is still being registered.
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  projectID: sonorous-stone-498307-u2
  credentials:
    # Crossplane provider pods authenticate to GCP via GKE Workload Identity.
    # provider-gcp-artifact KSA -> crossplane-gar@... (roles/artifactregistry.admin)
    # provider-gcp-sql KSA      -> crossplane-sql@... (roles/cloudsql.admin)
    source: InjectedIdentity
