apiVersion: gcp.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
spec:
  projectID: sonorous-stone-498307-u2
  credentials:
    # Crossplane provider pods authenticate to GCP via GKE Workload Identity.
    # The provider's Kubernetes ServiceAccount must be annotated with a GCP SA
    # that has roles/artifactregistry.admin (configured in the IaC repo).
    source: InjectedIdentity
