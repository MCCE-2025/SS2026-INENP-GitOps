# Composition backing XFrontendHosting: a GCS bucket configured for static
# website hosting (index.html as main + 404 fallback for SPA routing), public
# read, and object-admin for the CI service account. The bucket's public URL is
# patched back to status.url of the composite (the value we "store" per the
# assignment).
#
# Crossplane v2 runs Compositions in Pipeline mode, so the classic
# resources/patches model is supplied as input to function-patch-and-transform.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: frontend-hosting-gcs
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  compositeTypeRef:
    apiVersion: platform.inenp.werschlan.at/v1alpha1
    kind: XFrontendHosting
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # The static-hosting bucket.
          - name: bucket
            base:
              apiVersion: storage.gcp.upbound.io/v1beta1
              kind: Bucket
              spec:
                forProvider:
                  location: EU
                  uniformBucketLevelAccess: true
                  forceDestroy: true
                  website:
                    - mainPageSuffix: index.html
                      notFoundPage: index.html
                providerConfigRef:
                  name: default
            patches:
              - fromFieldPath: spec.parameters.bucketName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
              # Label the bucket so the IAM members can find it via a selector,
              # independent of the (immutable) MR name.
              - fromFieldPath: spec.parameters.bucketName
                toFieldPath: metadata.labels[frontend-hosting/bucket]
              - fromFieldPath: spec.parameters.location
                toFieldPath: spec.forProvider.location
              # Publish the public HTTP URL of the bucket website into the
              # COMPOSITE status. Read from the Bucket's own external-name (the
              # bucket name) so the value is available on this composed resource,
              # then transform into the public URL written back to the composite.
              - type: ToCompositeFieldPath
                fromFieldPath: metadata.annotations[crossplane.io/external-name]
                toFieldPath: status.url
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "http://%s.storage.googleapis.com/index.html"

          # Public read so browsers can fetch the SPA.
          - name: bucket-public-read
            base:
              apiVersion: storage.gcp.upbound.io/v1beta1
              kind: BucketIAMMember
              spec:
                forProvider:
                  role: roles/storage.objectViewer
                  member: allUsers
                  bucketSelector:
                    matchControllerRef: true
                providerConfigRef:
                  name: default
            patches:
              - fromFieldPath: spec.parameters.bucketName
                toFieldPath: spec.forProvider.bucketSelector.matchLabels[frontend-hosting/bucket]

          # CI service account can upload/sync/delete objects (keyless via WIF).
          - name: bucket-ci-writer
            base:
              apiVersion: storage.gcp.upbound.io/v1beta1
              kind: BucketIAMMember
              spec:
                forProvider:
                  role: roles/storage.objectAdmin
                  bucketSelector:
                    matchControllerRef: true
                providerConfigRef:
                  name: default
            patches:
              - fromFieldPath: spec.parameters.bucketName
                toFieldPath: spec.forProvider.bucketSelector.matchLabels[frontend-hosting/bucket]
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.ciServiceAccount
                  strategy: string
                  string:
                    fmt: "serviceAccount:%s"
                toFieldPath: spec.forProvider.member
