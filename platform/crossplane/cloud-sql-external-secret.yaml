# Password for the Crossplane-managed Cloud SQL user. The value lives only in
# GCP Secret Manager (created by IaC); ESO materializes it as a K8s Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloud-sql-credentials
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: cloud-sql-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: cloud-sql-app-password
