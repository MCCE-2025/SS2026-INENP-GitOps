# The actual frontend hosting instance (custom component). Crossplane provisions
# the GCS bucket from this and writes the public URL to status.url. Inspect it:
#   kubectl get xfrontendhosting weather-frontend -o jsonpath='{.status.url}'
#
# bucketName is a plain (non-domain) name on purpose: GCS requires Search Console
# domain-ownership verification for buckets named like a DNS domain. Since the SPA
# is served over the storage.googleapis.com URL (not a custom domain), a plain
# name avoids that verification and works immediately. Globally unique via the
# project id. This is the same bucket the CI job (release.yml) rsyncs into; the
# public URL is published to status.url (the value stored in the custom component).
apiVersion: platform.inenp.werschlan.at/v1alpha1
kind: XFrontendHosting
metadata:
  name: weather-frontend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parameters:
    bucketName: weather-frontend-spa-sonorous-stone-498307-u2
    location: EU
    ciServiceAccount: ci-image-push@sonorous-stone-498307-u2.iam.gserviceaccount.com
