# The actual frontend hosting instance (custom component). Crossplane provisions
# the GCS bucket from this and writes the public URL to status.url. Inspect it:
#   kubectl get xfrontendhosting weather-frontend -o jsonpath='{.status.url}'
#
# bucketName is the bucket's own public host. It must NOT reuse the cluster
# frontend host (apps/frontend/values.yaml -> weather.inenp.werschlan.at), which
# ExternalDNS points at the nginx ingress LB. The bucket gets its own DNS so the
# two don't collide. This is the same bucket the CI job (release.yml) rsyncs into.
apiVersion: platform.inenp.werschlan.at/v1alpha1
kind: XFrontendHosting
metadata:
  name: weather-frontend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parameters:
    bucketName: static.inenp.werschlan.at
    location: EU
    ciServiceAccount: ci-image-push@sonorous-stone-498307-u2.iam.gserviceaccount.com
