# Stable HTTPS link for the Argo CD UI so you don't need `kubectl port-forward`.
# TLS is issued by cert-manager (letsencrypt-prod) and DNS is created by external-dns,
# the same pattern the tenant frontends use.
#
# Argo CD's server speaks its own TLS on :8080 (it was installed WITHOUT --insecure),
# so nginx must talk to it over HTTPS. backend-protocol: HTTPS avoids the classic
# Argo redirect loop. force-ssl-redirect sends users from http -> https.
#
# Access control: this is publicly reachable and protected by Argo CD's built-in
# login. Get the initial admin password with:
#   kubectl -n argocd get secret argocd-initial-admin-secret \
#     -o jsonpath='{.data.password}' | base64 -d
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: argocd.inenp.werschlan.at
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.inenp.werschlan.at
      secretName: argocd-server-tls
  rules:
    - host: argocd.inenp.werschlan.at
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 443
