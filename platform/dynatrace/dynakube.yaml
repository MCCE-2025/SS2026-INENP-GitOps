# DynaKube — the single CR that tells the Dynatrace Operator what to deploy
# (OneAgent for APM/auto-instrumentation across all namespaces + an ActiveGate for
# Kubernetes monitoring and metrics ingest). It is applied by Argo AFTER the
# operator (which installs this CRD); see argocd/applications/dynatrace-config.yaml.
#
# apiUrl is your Dynatrace environment URL (NOT a secret) — set it below.
# Tokens are NOT here: they come from the ESO-managed "dynakube" Secret created by
# Terraform (IaC dynatrace.tf), referenced via spec.tokens.
apiVersion: dynatrace.com/v1beta4
kind: DynaKube
metadata:
  name: dynakube
  namespace: dynatrace
spec:
  # Your Dynatrace environment API URL (note the trailing /api). Not a secret.
  apiUrl: https://iga77291.live.dynatrace.com/api
  tokens: dynakube
  oneAgent:
    cloudNativeFullStack:
      # Small CPU/memory requests so the OneAgent DaemonSet pod fits on
      # CPU-request-saturated nodes (nodes were ~98% reserved by requests, even
      # though actual usage is low). Limits keep a safe ceiling.
      oneAgentResources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 300m
          memory: 512Mi
  activeGate:
    capabilities:
      - routing
      - kubernetes-monitoring
      - metrics-ingest
      - dynatrace-api
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
