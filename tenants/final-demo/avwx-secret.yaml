# AVWX API token for the backend (METAR / nearest airport). Synced from GCP
# Secret Manager by ESO; never in Git, never sent to the browser.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-keys
  namespace: final-demo
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: api-keys
    creationPolicy: Owner
  data:
    - secretKey: avwx-api-key
      remoteRef:
        key: avwx-api-key
