replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-backend/weather-app-backend
  # tag comes from tenants/versions.yaml (centralized)

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: weather-app-backend@sonorous-stone-498307-u2.iam.gserviceaccount.com

# AVWX token from the ESO-synced api-keys Secret (see avwx-secret.yaml).
apiKeys:
  useExistingSecret: true
  existingSecretName: api-keys
  existingSecretKey: avwx-api-key

# Dedicated DB user (Crossplane, db-user.yaml) with a Crossplane-generated
# password in cloud-sql-credentials; isolated to this tenant's schema.
database:
  enabled: true
  schema: tenant_z
  username: tenant_z
  credentialsSecretName: cloud-sql-credentials
  instanceConnectionName: sonorous-stone-498307-u2:europe-west3:weather-app-db

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Probes (incl. startupProbe for slow cold starts) come from the chart defaults.
