replicaCount: 2

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-frontend/weather-app-frontend
  tag: "v1.2.1"

service:
  type: ClusterIP
  port: 80

# Required: the tenant ResourceQuota enforces limits, so every pod must declare
# resource requests and limits or the namespace will reject it.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: tenant-a.inenp.werschlan.at
  hosts:
    - host: tenant-a.inenp.werschlan.at
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tenant-a-frontend-tls
      hosts:
        - tenant-a.inenp.werschlan.at
