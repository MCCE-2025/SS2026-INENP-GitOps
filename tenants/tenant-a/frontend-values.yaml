replicaCount: 2

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-frontend/weather-app-frontend
  # tag comes from tenants/versions.yaml (centralized)

service:
  type: ClusterIP
  port: 80

# Required: the tenant ResourceQuota enforces limits, so every pod must declare
# resource requests and limits or the namespace will reject it.
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Point the SPA at the in-cluster backend over the same host (/api), no rebuild.
runtimeConfig:
  enabled: true
  backendApiUrl: /api

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: tenant-a.inenp.werschlan.at
  hosts:
    - host: tenant-a.inenp.werschlan.at
      paths:
        - path: /
          pathType: Prefix
  # Route /api on this host to the tenant's backend Service.
  extraPaths:
    - path: /api
      pathType: Prefix
      serviceName: weather-app-backend
      servicePort: 8080
  tls:
    - secretName: tenant-a-frontend-tls
      hosts:
        - tenant-a.inenp.werschlan.at
