replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-backend/weather-app-backend
  # tag comes from tenants/versions.yaml (centralized)

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: weather-app-backend@sonorous-stone-498307-u2.iam.gserviceaccount.com

# This tenant's isolated PostgreSQL schema on the shared Cloud SQL instance.
database:
  enabled: true
  schema: tenant_a
  credentialsSecretName: cloud-sql-credentials
  instanceConnectionName: sonorous-stone-498307-u2:europe-west3:weather-app-db

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

# Tenant ResourceQuota requires explicit requests/limits.
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 35
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
