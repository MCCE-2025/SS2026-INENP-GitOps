# Per-tenant Cloud SQL login role. Crossplane generates a random password and
# writes it into the connection secret below (cloud-sql-credentials) in this
# tenant's namespace — the password never exists in Git. Schema-level isolation
# (GRANT/REVOKE) is enforced by the backend Flyway migration, not here, since the
# GCP provider cannot manage in-database grants.
apiVersion: sql.gcp.m.upbound.io/v1beta1
kind: User
metadata:
  name: staging-db-user
  namespace: staging
  annotations:
    crossplane.io/external-name: staging
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  forProvider:
    instanceRef:
      name: weather-app-db
      namespace: crossplane-system
  writeConnectionSecretToRef:
    name: cloud-sql-credentials
  providerConfigRef:
    name: default
    kind: ClusterProviderConfig
