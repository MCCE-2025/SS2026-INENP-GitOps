replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-backend/weather-app-backend
  # SPECIAL TENANT: staging pins its OWN backend version here, independent of the
  # centralized tenants/versions.yaml. Listed AFTER versions.yaml, so this wins.
  # Use this tenant to test a new backend image before promoting it centrally.
  tag: "v1.5.0"

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: weather-app-backend@sonorous-stone-498307-u2.iam.gserviceaccount.com

database:
  enabled: true
  schema: staging
  credentialsSecretName: cloud-sql-credentials
  instanceConnectionName: sonorous-stone-498307-u2:europe-west3:weather-app-db

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 35
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
