replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-frontend/weather-app-frontend
  # SPECIAL TENANT: staging pins its OWN frontend version here, independent of
  # the centralized tenants/versions.yaml. Because this file is listed AFTER
  # versions.yaml in the ApplicationSet, this tag wins.
  tag: "v1.8.0"

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 256Mi

runtimeConfig:
  enabled: true
  backendApiUrl: /api
  metarApiUrl: https://avwx.rest/api/metar/{icao}
  apiKeys:
    useExistingSecret: true
    existingSecretName: api-keys
    existingSecretKey: avwx-api-key

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: staging.inenp.werschlan.at
  hosts:
    - host: staging.inenp.werschlan.at
      paths:
        - path: /
          pathType: Prefix
  extraPaths:
    - path: /api
      pathType: Prefix
      serviceName: weather-app-backend
      servicePort: 8080
  tls:
    - secretName: staging-frontend-tls
      hosts:
        - staging.inenp.werschlan.at
