replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/sonorous-stone-498307-u2/weather-app-frontend/weather-app-frontend
  # tag comes from tenants/versions-frontend.yaml (centralized)

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 256Mi

runtimeConfig:
  enabled: true
  backendApiUrl: /api

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: test.inenp.werschlan.at
  hosts:
    - host: test.inenp.werschlan.at
      paths:
        - path: /
          pathType: Prefix
  extraPaths:
    - path: /api
      pathType: Prefix
      serviceName: weather-app-backend
      servicePort: 8080
  tls:
    - secretName: test-frontend-tls
      hosts:
        - test.inenp.werschlan.at
