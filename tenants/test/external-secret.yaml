# Cloud SQL password for this tenant's backend. Synced from GCP Secret Manager
# by ESO; never stored in Git. Shared password, tenant isolation is by schema.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloud-sql-credentials
  namespace: test
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: cloud-sql-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: cloud-sql-app-password
