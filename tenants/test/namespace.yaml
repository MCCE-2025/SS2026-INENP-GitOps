apiVersion: v1
kind: Namespace
metadata:
  name: test
  labels:
    tenant: test
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: test-quota
  namespace: test
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
